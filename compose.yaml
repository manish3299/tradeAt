services:
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: tradeat
      POSTGRES_USER: tradeat
      POSTGRES_PASSWORD: tradeat
    ports: ['5432:5432']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tradeat -d tradeat']
      interval: 5s
      timeout: 3s
      retries: 10
    volumes: ['postgres_data:/var/lib/postgresql/data']
  redis:
    image: redis:8.0.2-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  postgres_data:
